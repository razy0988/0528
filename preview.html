<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校園密室逃脫：消失的鑰匙</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.38), rgba(0, 0, 0, 0.55)),
        url("images/classroom-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: #4a3720;
      overflow-x: hidden;
    }

    .game-container {
      width: 100%;
      max-width: min(1440px, 96vw);
      margin: 0 auto;
      padding: 22px 24px 34px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }

    h1 {
      color: #fff4c9;
      font-size: 42px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.58);
    }

    h2 {
      color: #6b4517;
      font-size: 30px;
    }

    p {
      line-height: 1.8;
      font-size: 20px;
    }

    .scene {
      width: 100%;
      background: rgba(248, 243, 232, 0.88);
      border: none;
      border-radius: 34px;
      padding: 42px 42px 28px;
      margin: 20px auto 0;
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      color: #4a3720;
    }

    .scene p {
      margin: 0;
      color: #4d3821;
      font-size: 23px;
      line-height: 1.9;
      font-weight: 700;
      text-align: left;
    }

    .hint-box {
      background: #f4e1ad;
      border: 3px solid #d8a947;
      border-radius: 22px;
      color: #62471c;
      padding: 21px 28px;
      margin: 28px auto 34px;
      font-size: 22px;
      line-height: 1.7;
      font-weight: 800;
      text-align: center;
      max-width: none;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 16px 20px;
      background: linear-gradient(90deg, #d58627, #efb547);
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      line-height: 1.5;
      box-shadow: 0 8px 18px rgba(181, 117, 34, 0.24);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .start-btn {
      display: block;
      width: 100%;
      margin: 12px auto 0;
      padding: 18px 24px;
      border-radius: 18px;
      font-size: 22px;
    }

    .progress {
      margin: 18px auto;
      background: rgba(255, 255, 255, 0.45);
      border: 2px solid rgba(216, 169, 71, 0.6);
      border-radius: 999px;
      height: 20px;
      overflow: hidden;
      max-width: 1180px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d58627, #efb547, #f6d979);
      transition: 0.4s;
    }

    .code-display {
      text-align: center;
      font-size: 20px;
      margin: 12px 0 18px;
      color: #fff4c9;
      font-weight: 900;
      text-shadow: 0 3px 8px rgba(0,0,0,0.55);
    }

    input {
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      border: 3px solid #d6be8e;
      font-size: 18px;
      margin: 15px 0;
      outline: none;
      background: #f7f5f1;
      color: #4a3720;
    }

    input:focus {
      border-color: #d6932f;
      box-shadow: 0 0 0 4px rgba(214, 147, 47, 0.15);
    }

    .success {
      color: #166534;
      font-weight: 900;
      text-align: center;
      margin-top: 18px;
      font-size: 21px;
    }

    .wrong {
      color: #b91c1c;
      font-weight: 900;
      text-align: center;
      margin-top: 18px;
      font-size: 20px;
    }

    .report {
      background: rgba(255, 255, 255, 0.94);
      color: #4a3720;
      padding: 28px;
      border-radius: 24px;
      margin-top: 20px;
      line-height: 1.8;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .report h2 {
      color: #4a3720;
    }

    .student-card {
      background: #fff3cf;
      color: #4a3720;
      padding: 14px 18px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-weight: 900;
      border: 2px solid #d8a947;
    }

    .wrong-list {
      background: #fee2e2;
      color: #7f1d1d;
      border-left: 6px solid #dc2626;
      padding: 16px 18px;
      border-radius: 12px;
      margin: 16px 0;
      font-weight: bold;
    }

    .wrong-item {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(127, 29, 29, 0.25);
      font-weight: bold;
    }

    .strategy {
      display: block;
      margin-top: 4px;
      font-weight: normal;
      color: #7f1d1d;
    }

    .small-text {
      font-size: 16px;
      color: #5d4522;
      text-align: center;
      font-weight: 700;
    }

    .tag {
      display: inline-block;
      background: rgba(255, 255, 255, 0.86);
      color: #7a4c13;
      border: 2px solid #d8a947;
      padding: 8px 14px;
      border-radius: 999px;
      margin: 5px;
      font-size: 16px;
      font-weight: 800;
    }

    .cover-title {
      font-size: 64px;
      font-weight: 900;
      color: #fff4c9;
      margin: 0;
      letter-spacing: 3px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.6);
    }

    .cover-subtitle {
      text-align: center;
      color: #ffd25e;
      font-size: 30px;
      font-weight: 900;
      margin-top: 10px;
      margin-bottom: 18px;
      letter-spacing: 2px;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.55);
    }

    .cover-card {
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 36px 32px;
      max-width: 560px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
    }

    .form-group {
      margin-bottom: 22px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: #4b351b;
      font-weight: 900;
      font-size: 20px;
    }

    .form-group input {
      margin: 0;
    }

    .cover-note {
      margin-top: 26px;
      text-align: center;
      color: #6a5234;
      font-size: 19px;
      line-height: 2;
      font-weight: 800;
    }

    @media (max-width: 768px) {
      .game-container {
        padding: 16px;

      h1 {

      }

      h2 {
        font-size: 24px;
      }

      .cover-title {

    }

    function showCover() {
      game.innerHTML = `
        <h1 class="cover-title">校園密室逃脫</h1>
        <div class="cover-subtitle">消失的鑰匙</div>

        <div class="scene">
          <p>
            放學後，你和同學正在整理教室，突然聽見「喀！」的一聲，
            教室門竟然自動上鎖了。
          </p>

          <div class="hint-box">
            你必須完成六道跨領域任務，蒐集密碼碎片，找回消失的鑰匙。
          </div>

          <div class="cover-card">
            <div class="form-group">
              <label for="className">班級</label>
              <input id="className" type="text" placeholder="例如：201">
            </div>

            <div class="form-group">
              <label for="seatNumber">座號</label>
              <input id="seatNumber" type="text" placeholder="例如：12">
            </div>

            <div class="form-group">
              <label for="studentName">姓名</label>
              <input id="studentName" type="text" placeholder="請輸入姓名">
            </div>

            <button class="start-btn" onclick="saveStudentInfo()">進入任務說明</button>

            <div id="coverFeedback"></div>
          </div>

          <div class="cover-note">
            任務領域：國語、數學、社會、自然、英文、跨領域素養。<br>
            每一關都會隨機抽題，答對後可獲得密碼碎片。
          </div>
        </div>
      `;
    }

    function saveStudentInfo() {
      const className = document.getElementById("className").value.trim();
      const seatNumber = document.getElementById("seatNumber").value.trim();
      const studentName = document.getElementById("studentName").value.trim();
      const coverFeedback = document.getElementById("coverFeedback");

      if (!className || !seatNumber || !studentName) {
        coverFeedback.innerHTML = `
          <div class="wrong">
            請先填寫班級、座號和姓名，再開始任務。
          </div>
        `;
        return;
      }

      studentInfo = {
        className,
        seatNumber,
        studentName
      };

      showStart();
    }

    function showStart() {
      game.innerHTML = `
        <h1>校園密室逃脫：消失的鑰匙</h1>
        <div class="scene">
          <p>
            黑板上慢慢浮現一行字：
          </p>
          <div class="hint-box">
            「消失的鑰匙藏在六道任務之中。完成國語、數學、社會、自然、英文與素養挑戰，
            蒐集六個密碼碎片，才能打開逃脫門。」
          </div>
          <p>
            ${studentInfo.studentName} 小偵探，你必須運用五、六年級所學的知識，
            解開跨領域謎題，找回消失的鑰匙。
          </p>
        </div>

        <div style="text-align:center;">
          <span class="tag">國語</span>
          <span class="tag">數學</span>
          <span class="tag">社會</span>
          <span class="tag">自然</span>
          <span class="tag">英文</span>
          <span class="tag">素養題</span>
        </div>

        <p class="small-text">每一關都會從題庫中隨機抽出 1 題。</p>
        <button class="start-btn" onclick="startGame()">開始逃脫任務</button>
      `;
    }

    function startGame() {
      currentLevel = 0;
      selectedLevels = [];
      codePieces = [];
      wrongCount = 0;
      correctSubjects = [];
      wrongRecords = [];

      questionBank.forEach(subject => {
        const randomIndex = Math.floor(Math.random() * subject.questions.length);
        const selectedQuestion = subject.questions[randomIndex];

        const shuffledOptions = selectedQuestion.options
          .map((option, optionIndex) => ({
            option,
            originalIndex: optionIndex
          }))
          .sort(() => Math.random() - 0.5);

        const newAnswerIndex = shuffledOptions.findIndex(
          item => item.originalIndex === selectedQuestion.answer
        );

        selectedLevels.push({
          subject: subject.subject,
          subjectKey: subject.subjectKey,
          scene: subject.scene,
          ...selectedQuestion,
          options: shuffledOptions.map(item => item.option),
          answer: newAnswerIndex,
          hasRecordedWrong: false
        });
      });

      showLevel();
    }

    function updateProgress() {
      const percent = (currentLevel / selectedLevels.length) * 100;
      return `
        <div class="progress">
          <div class="progress-bar" style="width:${percent}%"></div>
        </div>
        <div class="code-display">
          目前取得的密碼碎片：${codePieces.length > 0 ? codePieces.join(" - ") : "尚未取得"}
        </div>
      `;
    }

    function showLevel() {
      const level = selectedLevels[currentLevel];

      game.innerHTML = `
        <h1>校園密室逃脫：消失的鑰匙</h1>
        ${updateProgress()}
        <h2>第 ${currentLevel + 1} 關：${level.subject}</h2>

        <div class="scene question-scene">
          <p>${level.scene}</p>
          <div class="hint-box">${level.question}</div>

          <div class="options">
            ${level.options.map((option, index) => `
              <button class="option-btn" onclick="checkAnswer(${index})">${option}</button>
            `).join("")}
          </div>

          <div id="feedback"></div>
        </div>
      `;
    }

    function checkAnswer(index) {
      const level = selectedLevels[currentLevel];
      const feedback = document.getElementById("feedback");
      const buttons = document.querySelectorAll(".option-btn");

      if (index === level.answer) {
        buttons.forEach(btn => btn.disabled = true);

        codePieces.push(level.code);
        correctSubjects.push(level.subjectKey);

        feedback.innerHTML = `
          <div class="success">
            答對了！你取得密碼碎片：${level.code}
          </div>
          <button class="start-btn" onclick="nextLevel()">前往下一關</button>
        `;
      } else {
        wrongCount++;

        if (!level.hasRecordedWrong) {
          wrongRecords.push({
            subject: level.subjectKey,
            question: level.question,
            strategy: level.strategy || "建議先圈出題目關鍵字，再依照線索一步一步判斷。"
          });
          level.hasRecordedWrong = true;
        }

        feedback.innerHTML = `
          <div class="wrong">
            這個答案不太對，請再觀察題目中的線索。
          </div>
        `;
      }
    }

    function nextLevel() {
      currentLevel++;

      if (currentLevel < selectedLevels.length) {
        showLevel();
      } else {
        showFinalDoor();
      }
    }

    function showFinalDoor() {
      game.innerHTML = `
        <h1>最後逃脫門</h1>
        ${updateProgress()}

        <div class="scene final-door-scene">
          <p>
            你已經完成六道跨領域任務，現在來到最後一扇門前。
            門上的密碼鎖需要輸入六位數密碼。
          </p>

          <div class="hint-box">
            請依照你取得密碼碎片的順序，輸入六位數逃脫密碼。
          </div>

          <input id="finalCode" class="final-code-input" type="text" placeholder="請輸入六位數密碼">

          <button class="start-btn final-door-btn" onclick="checkFinalCode()">確認開門</button>

          <div id="finalFeedback"></div>
        </div>
      `;
    }

    function checkFinalCode() {
      const input = document.getElementById("finalCode").value.trim();
      const answer = codePieces.join("");
      const finalFeedback = document.getElementById("finalFeedback");

      if (input === answer) {
        showReport();
      } else {
        finalFeedback.innerHTML = `
          <div class="wrong">
            密碼錯誤！請依照畫面上顯示的密碼碎片順序輸入，不要自行重新排列。
          </div>
        `;
      }
    }

    function showReport() {
      const report = generateReport();
      const wrongReview = generateWrongReview();

      game.innerHTML = `
        <h1>成功逃脫！</h1>

        <div class="scene">
          <p class="success">恭喜你找回消失的鑰匙，成功逃出神祕教室！</p>

          <div class="report">
            <h2>小偵探任務報告</h2>

            <div class="student-card">
              班級：${studentInfo.className}　
              座號：${studentInfo.seatNumber}　
              姓名：${studentInfo.studentName}
            </div>

            ${wrongReview}
            <p>${report}</p>
          </div>

          <button class="start-btn" onclick="showCover()">重新挑戰</button>
        </div>
      `;
    }

    function generateWrongReview() {
      if (wrongRecords.length === 0) {
        return `
          <div class="wrong-list" style="background:#dcfce7; color:#14532d; border-left-color:#16a34a;">
            本次挑戰沒有答錯的題目，表現很穩定！
          </div>
        `;
      }

      const wrongText = wrongRecords.map(record => {
        return `
          <div class="wrong-item">
            ${record.subject}：「${record.question}」
            <span class="strategy">答題策略：${record.strategy}</span>
          </div>
        `;
      }).join("");

      return `
        <div class="wrong-list">
          本次可以再複習的地方：
          ${wrongText}
        </div>
      `;
    }

    function generateReport() {
      let subjectText = correctSubjects.join("、");

      let comment = "";

      if (wrongCount === 0) {
        comment = "你在整個任務中表現非常穩定，能快速理解題意並做出正確判斷。";
      } else if (wrongCount <= 3) {
        comment = "你在任務中雖然遇到一些小挑戰，但能持續嘗試並修正答案，展現良好的解題態度。";
      } else {
        comment = "你在任務中遇到較多困難，但仍然完成挑戰。建議之後可以先圈出題目關鍵字，再一步一步推理。";
      }

      return `
        親愛的 ${studentInfo.studentName} 小偵探你好，你成功完成了「校園密室逃脫：消失的鑰匙」任務。
        這次任務中，你完成了 ${subjectText} 等跨領域挑戰。
        ${comment}
        整體來說，你能運用不同學科的知識解決問題，也能在挑戰中練習冷靜思考與合作溝通，是一位具有觀察力、思考力與學習毅力的小偵探！
      `;
    }

    showCover();
  </script>
